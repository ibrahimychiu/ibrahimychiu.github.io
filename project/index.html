<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>李宗瑞案社會網絡與裁判資料分析</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="network-stage" aria-label="社會網絡圖">
        <div class="topbar">
          <div>
            <h1>李宗瑞案社會網絡與裁判資料分析</h1>
            <p>以司法院裁判書查詢、最高法院新聞稿、憲法法庭裁定與公開裁判資訊為資料骨架；被害人與非公眾人物一律化名。</p>
          </div>
          <div class="toolbar" aria-label="工具列">
            <label>
              <span>資料層</span>
              <select id="layerSelect">
                <option value="all">全部關係</option>
                <option value="victim">被害人關係</option>
                <option value="process">司法程序</option>
                <option value="support">周邊人物</option>
                <option value="tech">科技證據</option>
              </select>
            </label>
            <label>
              <span>搜尋</span>
              <input id="searchInput" type="search" placeholder="化名、案號、構成要件、量刑..." />
            </label>
          </div>
        </div>

        <div class="main-grid">
          <section class="graph-panel">
            <svg id="network" viewBox="0 0 980 720" role="img" aria-label="李宗瑞案人物與制度社會網絡圖"></svg>
            <div class="legend" id="legend"></div>
            <div id="hoverCard" class="hover-card" aria-hidden="true"></div>
          </section>

          <aside class="detail-panel" aria-live="polite">
            <div class="panel-tabs" role="tablist" aria-label="資料面板">
              <button class="tab active" data-tab="profile" type="button">人物</button>
              <button class="tab" data-tab="events" type="button">時間</button>
              <button class="tab" data-tab="elements" type="button">構成要件</button>
              <button class="tab" data-tab="sentencing" type="button">量刑</button>
              <button class="tab" data-tab="sources" type="button">來源</button>
            </div>
            <div id="detailContent"></div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
